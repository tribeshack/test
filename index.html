<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Time</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('characters-Stan-South-Park-Kyle-Kenny-Cartman.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .date {
            font-size: 20px;
            color: #555;
            margin-bottom: 10px;
            font-family: 'Arial', sans-serif;
        }

        .time {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
        }

        canvas {
            margin-top: 24px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .wikinews-panel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 500px;
            height: 500px;
            border-radius: 10px;
            overflow: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            border: 2px solid #667eea;
        }

        .wikinews-panel iframe {
            width: 100%;
            height: 100%;
            border: none;
            min-width: 800px;
        }

        .ticker-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 0;
            overflow: hidden;
            z-index: 100;
        }

        .ticker-label {
            display: inline-block;
            background: #667eea;
            color: #fff;
            font-weight: bold;
            padding: 0 14px;
            margin-right: 16px;
            font-size: 14px;
            line-height: 24px;
            vertical-align: middle;
            white-space: nowrap;
        }

        .ticker-track {
            display: inline-block;
            white-space: nowrap;
            animation: ticker-scroll 40s linear infinite;
            font-size: 14px;
            vertical-align: middle;
        }

        .ticker-track span {
            margin-right: 60px;
        }

        @keyframes ticker-scroll {
            0%   { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Current Date &amp; Time</h1>
        <div class="date" id="current-date"></div>
        <div class="time" id="current-time"></div>
        <canvas id="dial-clock" width="200" height="200"></canvas>
    </div>

    <div class="wikinews-panel">
        <iframe src="https://en.wikinews.org/wiki/Main_Page" title="Wikinews" scrolling="yes"></iframe>
    </div>

    <div class="ticker-wrap">
        <span class="ticker-label">NEWS</span>
        <span class="ticker-track" id="ticker-track">Loading headlines...</span>
    </div>

    <script>
        function drawClock() {
            const canvas = document.getElementById('dial-clock');
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = 90;
            const now = new Date();

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Face
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
            ctx.fillStyle = '#f9f9f9';
            ctx.fill();
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Hour marks
            for (let i = 0; i < 12; i++) {
                const angle = (i * Math.PI) / 6;
                const x1 = cx + Math.sin(angle) * (radius - 10);
                const y1 = cy - Math.cos(angle) * (radius - 10);
                const x2 = cx + Math.sin(angle) * (radius - 18);
                const y2 = cy - Math.cos(angle) * (radius - 18);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            const sec = now.getSeconds();
            const min = now.getMinutes();
            const hr  = now.getHours() % 12;

            // Hour hand
            const hourAngle = (hr * Math.PI) / 6 + (min * Math.PI) / 360;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.sin(hourAngle) * (radius * 0.55), cy - Math.cos(hourAngle) * (radius * 0.55));
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Minute hand
            const minAngle = (min * Math.PI) / 30 + (sec * Math.PI) / 1800;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.sin(minAngle) * (radius * 0.75), cy - Math.cos(minAngle) * (radius * 0.75));
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Second hand
            const secAngle = (sec * Math.PI) / 30;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.sin(secAngle) * (radius * 0.85), cy - Math.cos(secAngle) * (radius * 0.85));
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Center dot
            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
            ctx.fillStyle = '#667eea';
            ctx.fill();
        }

        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('current-time').textContent = `${hours}:${minutes}:${seconds}`;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = now.toLocaleDateString(undefined, options);
        }
        
        updateTime();
        drawClock();
        setInterval(() => { updateTime(); drawClock(); }, 1000);

        // Fetch top stories from Hacker News public API
        fetch('https://hacker-news.firebaseio.com/v0/topstories.json')
            .then(res => res.json())
            .then(ids => {
                const top10 = ids.slice(0, 10);
                return Promise.all(top10.map(id =>
                    fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json())
                ));
            })
            .then(stories => {
                const headlines = stories.filter(s => s && s.title).map(s => s.title);
                const track = document.getElementById('ticker-track');
                track.innerHTML = headlines.map(h => `<span>&#9658; ${h}</span>`).join('');
            })
            .catch(() => {
                document.getElementById('ticker-track').textContent = 'Unable to load headlines.';
            });
    </script>
</body>
</html>
